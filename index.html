let filterExercise = '';

// 這是會被動態修改的變量

// 新增：儲存自訂項目到 Firebase
async function saveCustomExercises() {
  if(!currentUser) return;
  try {
    await db.collection("users").doc(currentUser.uid).collection("settings").doc("preferences").set({
      exerciseData: exerciseData
    }, { merge: true });
    console.log("自訂項目已同步至 Firebase");
  } catch (e) {
    console.error("儲存失敗", e);
    showToast("同步失敗", "error");
  }
}

// ========== POINTS CALCULATION ==========
function calcPoints(rec) {
  if(rec.record_type !== 'workout') return 0;
  const cat = rec.category;
  
  if(cat === 'strength') {
    let pts = Math.round((rec.weight||0) * (rec.reps||0) * (rec.sets||1) / 200);
    return Math.min(7, Math.max(2, pts));
  }
  
  if(cat === 'cardio') {
    let pts = Math.round(parseDurationMin(rec.duration) * 0.6);
    return Math.min(30, Math.max(5, pts)); 
  }
  
  if(cat === 'hiit') {
    let pts = Math.round(parseDurationMin(rec.duration) * 1);
    return Math.min(30, Math.max(5, pts));
  }
  
  if(cat === 'functional') {
    let pts = 0;
    if (rec.duration) pts = Math.round(parseFloat(rec.duration) * 0.6);
    else pts = Math.round((rec.sets||1) * (rec.reps||1) * 0.5);
    return Math.min(30, Math.max(5, pts));
  }
  
  return 3; // 預設保底分數
}

function parseDurationMin(d) {
  if(!d) return 0;
  const p = d.split(':');
  return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60;
}

// 修改：支援 Admin 讀取及特別扣分/加分機制
function getTotalPoints(recordsArr = allRecords, rewardsArr = rewards) {
  let earned = 0, spent = 0;
  recordsArr.forEach(r => {
    // 運動得分 (必須非 planned 狀態)，或 Admin 手動調整嘅分數
    if((r.record_type === 'workout' && r.status !== 'planned') || r.record_type === 'point_adjustment') earned += (r.points || 0);
    // 換領扣分 (優先讀取記錄中寫死嘅 cost，防商店改價)
    if(r.record_type === 'redemption') spent += (r.cost !== undefined ? r.cost : (rewardsArr.find(rw=>rw.id===r.reward_id)?.cost || 0));
  });
  return { earned, spent, available: earned - spent };
}

// ========== NAVIGATION ==========
function switchPage(page) {
  currentPage = page;
  
  const pages = ['calendar','shop','history','friends','settings', 'admin'];
  pages.forEach(p => {
    // 1. 處理頁面顯示/隱藏
    const pageEl = document.getElementById('page-'+p);
    if(pageEl) pageEl.classList.add('hidden');
    
    // 2. 處理導航按鈕樣式
    const navEl = document.getElementById('nav-'+p);
    if(navEl) {
      // 獲取目前的 isAdmin 狀態
      const isAdmin = currentUser && currentUser.email === 'adming@gymigogo.com';
      
      // 如果不是 Admin 且是管理按鈕，必須保持隱藏
      if (p === 'admin' && !isAdmin) {
        navEl.className = 'hidden flex-col items-center gap-0.5 px-4 py-1 rounded-xl transition-all tab-inactive';
      } else {
        // 根據是否選中，切換 active/inactive
        const isActive = (p === page);
        navEl.className = `flex flex-col items-center gap-0.5 px-4 py-1 rounded-xl transition-all ${isActive ? 'tab-active' : 'tab-inactive'}`;
      }
    }
  });

  const selectedPageEl = document.getElementById('page-'+page);
  if(selectedPageEl) selectedPageEl.classList.remove('hidden');
  
  renderCurrentPage();
  lucide.createIcons();
}

function renderCurrentPage() {
  if(currentPage === 'calendar') renderCalendar();
  else if(currentPage === 'shop') renderShop();
  else if(currentPage === 'history') renderHistory();
  else if(currentPage === 'friends') renderFriends(); 
  else if(currentPage === 'settings') renderSettings();
  else if(currentPage === 'admin') renderAdmin();
}

function showToast(msg, type='success') {
  const colors = { success: 'bg-green-400 text-white', error: 'bg-red-400 text-white', info: 'bg-blue-400 text-white' };
  const t = document.createElement('div');
  t.className = `toast-msg ${colors[type]||colors.info}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} selectedDate=null; renderCalendar(); }
function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} selectedDate=null; renderCalendar(); }

function goToToday() {
  const d = new Date();
  calYear = d.getFullYear();
  calMonth = d.getMonth();
  selectedDate = toDateStr(d); // 自動揀埋今日，顯示今日嘅詳情
  renderCalendar();
}

function formatWorkoutDetail(w) {
  if(w.category==='strength') return `${w.sets||1} 組 × ${w.reps||0} 次 @ ${w.weight||0}kg`;
  if(w.category==='cardio') {
    let durStr = w.duration ? (String(w.duration).includes(':') ? w.duration : w.duration + ' 分鐘') : '0 分鐘';
    let s = durStr;
    if(w.distance) s += ` | ${w.distance}km`;
    if(w.level) s += ` | Lv.${w.level}`;
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
  if(w.category==='hiit') {
    let durStr = w.duration ? (String(w.duration).includes(':') ? w.duration : w.duration + ' 分鐘') : '0 分鐘';
    let s = durStr;
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
if(w.category==='functional') {
    let s = w.duration ? (w.duration + ' 分鐘') : `${w.sets||1} 組 × ${w.reps||0} 次`;
    if(w.notes) s += ` | ${w.notes}`;
    return s;
  }
  return '';
}

// ========== CLIPBOARD FUNCTIONS ==========
let pressTimer = null;
let isLongPress = false;

window.handlePressStart = (e, backendId) => {
  isLongPress = false;
  if (pressTimer) clearTimeout(pressTimer);
  pressTimer = setTimeout(() => {
    isLongPress = true;
    // 觸發微震動回饋 (如果手機支援)
    if (navigator.vibrate) navigator.vibrate(50);
    showWorkoutMenu(e, backendId);
  }, 600); // 600毫秒當作長按
};

window.handlePressEnd = () => {
  if (pressTimer) {
    clearTimeout(pressTimer);
    pressTimer = null;
  }
};

window.handleRecordClick = (e, backendId) => {
  if (isLongPress) {
    e.preventDefault();
    e.stopPropagation();
    return; // 如果係長按，就唔好觸發編輯
  }
  editRecord(backendId);
};

        <i data-lucide="copy-check" class="w-5 h-5"></i> 複製全日記錄
      </button>

function copyWorkout(backendId) {
  const rec = allRecords.find(r => r.__backendId === backendId);
  if(!rec) return;
  
  clipboardWorkout = [rec]; // 變成陣列儲存
  clipboardMode = true;
  closeModal();
  showToast('已複製！按日曆日子粘貼', 'success');
  renderCalendar();
}

function copyDayWorkouts(dateStr) {
  const dayRecs = allRecords.filter(r => r.record_type === 'workout' && r.date === dateStr);
  if(dayRecs.length === 0) return;
  
  clipboardWorkout = dayRecs; // 將嗰日所有記錄變成陣列儲存
  clipboardMode = true;
  closeModal();
  showToast(`已複製 ${dayRecs.length} 筆記錄！按日子粘貼`, 'success');
  renderCalendar();
}

function cancelClipboard() {
  clipboardMode = false;
  clipboardWorkout = null;
  showToast('已取消複製', 'info');
  renderCalendar();
}

async function pasteWorkout(dateStr) {
  if(!clipboardWorkout || clipboardWorkout.length === 0) return;
  
  const btn = document.querySelector('button:hover') || document.body;
  if(btn) btn.style.opacity = '0.7';

  const currentCount = allRecords.filter(r=>r.record_type==='workout').length;
  if(currentCount + clipboardWorkout.length >= 9999) {
    showToast('已達記錄上限 (9999)！', 'error');
    if(btn) btn.style.opacity = '1';
    return;
  }

  try {
    // 將所有要 Copy 嘅記錄準備成 Promise Array
    const todayStr = toDateStr(new Date());
    const isFuture = dateStr > todayStr;
    
   const promises = clipboardWorkout.map(srcRec => {
      const newRec = {
        record_type: 'workout',
        date: dateStr,
        category: srcRec.category,
        exercise: srcRec.exercise,
        weight: srcRec.weight || 0,
        reps: srcRec.reps || 0,
        sets: srcRec.sets || 1,
        duration: srcRec.duration || '',
        distance: srcRec.distance || 0,
        level: srcRec.level || 0,
        notes: srcRec.notes || '',
        link: srcRec.link || '', 
        points: srcRec.points || 0,
        reward_id: '', used: false, redeemed_at: '',
        user_name: currentUser ? (currentUser.displayName || currentUser.email.split('@')[0]) : '',
        font_size: 0, status: isFuture ? 'planned' : (srcRec.status || 'completed') // 👈 貼去未來日子強制轉做計劃
      };
      // 加入 Firebase 寫入隊列
      return db.collection("users").doc(currentUser.uid).collection("records").add(newRec);
    });

    // 執行批量寫入 (併發處理，速度極快)
    await Promise.all(promises);
    
    if(btn) btn.style.opacity = '1';
    showToast(`成功粘貼 ${clipboardWorkout.length} 筆記錄！`, 'success');
    clipboardMode = false;
    clipboardWorkout = null;
    selectedDate = dateStr;
    renderCalendar();
  } catch (e) {
    console.error(e);
    showToast('粘貼失敗，請檢查網絡', 'error');
    if(btn) btn.style.opacity = '1';
  }
}

function inputField(id, label, type, val, ph) {
  // 如果係數字框，就渲染成 [-] 輸入框 [+] 嘅樣式
  if (type === 'number') {
    // 智能判斷每次加減嘅幅度 (Step)
    let step = 1;
    if (id.includes('weight')) step = 2.5; // 重量預設每次加 2.5kg
    else if (id.includes('distance')) step = 0.5; // 距離預設加 0.5km
    else if (id.includes('duration')) step = 5; // 時間每次加減 5 分鐘
    
    return `<div>
      <label class="text-xs font-bold text-slate-500 block mb-1">${label}</label>
      <div class="flex items-center shadow-sm rounded-xl overflow-hidden border-2 border-sky2 focus-within:border-primary focus-within:ring-2 focus-within:ring-sky1 transition-all bg-white">
        <button type="button" onclick="window._stepInput('add_${id}', -${step})" class="w-12 h-12 flex-shrink-0 flex items-center justify-center bg-sky1 text-primary font-extrabold text-2xl hover:bg-sky2 active:bg-sky3 transition touch-none select-none">-</button>
        <input id="add_${id}" type="number" value="${val}" placeholder="${ph}" step="any" class="w-full h-12 px-2 text-center focus:outline-none font-extrabold text-slate-700 bg-white text-lg">
        <button type="button" onclick="window._stepInput('add_${id}', ${step})" class="w-12 h-12 flex-shrink-0 flex items-center justify-center bg-sky1 text-primary font-extrabold text-2xl hover:bg-sky2 active:bg-sky3 transition touch-none select-none">+</button>
      </div>
    </div>`;
  }
  
  // 如果係普通文字框 (例如備註/連結)，保持原樣
  return `<div><label class="text-xs font-bold text-slate-500 block mb-1">${label}</label>
    <input id="add_${id}" type="${type}" value="${val}" placeholder="${ph}" class="w-full border-2 border-sky2 rounded-xl px-3 py-3 focus:border-primary focus:outline-none transition font-semibold shadow-sm"></div>`;
}

// 處理 +/- 按鈕點擊事件
window._stepInput = (id, delta) => {
  const input = document.getElementById(id);
  if(!input) return;
  // 攞現有數值，如果係吉嘅就當係 0
  let val = parseFloat(input.value) || 0;
  val += delta;
  if(val < 0) val = 0; // 防止變負數
  
  // 解決 JavaScript 小數點加減誤差 (例如 0.1 + 0.2 = 0.300000004)
  input.value = parseFloat(val.toFixed(2));
  
  // 觸發微震動 (手機手感更好)
  if (navigator.vibrate) navigator.vibrate(20);
};

async function submitWorkout(date, cat, exercise, status = 'completed') {
  const btn = document.getElementById('submitWorkoutBtn');
  const pBtn = document.getElementById('planWorkoutBtn');
  
  if(btn) btn.disabled = true;
  if(pBtn) pBtn.disabled = true;

  if(allRecords.filter(r=>r.record_type==='workout').length >= 9999) {
    showToast('已達記錄上限 (9999)！請刪除一些舊記錄', 'error');
    if(btn) btn.disabled = false;
    if(pBtn) pBtn.disabled = false;
    return;
  }

  const gv = id => { const e = document.getElementById('add_'+id); return e ? e.value : ''; };
  const rec = {
    record_type: 'workout', date, category: cat, exercise,
    weight: parseFloat(gv('weight'))||0, reps: parseInt(gv('reps'))||0, sets: parseInt(gv('sets'))||1,
    duration: gv('duration')||'', distance: parseFloat(gv('distance'))||0, level: parseInt(gv('level'))||0,
    notes: gv('notes')||'', link: gv('link')||'', // 👈 新增 link
    points: 0, reward_id:'', used: false, redeemed_at:'', user_name: currentUser ? (currentUser.displayName || currentUser.email.split('@')[0]) : '',
    font_size: 0, status: status // 👈 加入狀態：planned 或 completed
  };
  rec.points = calcPoints(rec);

  await db.collection("users").doc(currentUser.uid).collection("records").add(rec);
  const result = { isOk: true };
  if(result.isOk) {
    closeModal();
    if(status === 'planned') showToast('📝 計劃已建立！', 'success');
    else showToast(`+${rec.points}⭐ 已記錄！`, 'success');
  } else {
    showToast('儲存失敗，請重試', 'error');
    if(btn) btn.disabled = false;
    if(pBtn) pBtn.disabled = false;
  }
}

async function saveEdit(backendId) {
  const btn = document.getElementById('saveEditBtn');
  if(btn) { btn.disabled = true; btn.textContent = '儲存中...'; }

  const rec = allRecords.find(r => r.__backendId === backendId);
  if(!rec) { closeModal(); return; }

  const gv = id => { const e = document.getElementById('add_edit_'+id); return e ? e.value : ''; };
  
  // 📅 獲取新日期，並防呆檢查（移去未來自動轉為計劃）
  const newDate = gv('date') || rec.date;
  const todayStr = toDateStr(new Date());
  let finalStatus = rec.status || 'completed';
  if (newDate > todayStr) finalStatus = 'planned'; 

  const updated = {...rec,
    date: newDate,
    weight: parseFloat(gv('weight'))||0, reps: parseInt(gv('reps'))||0, sets: parseInt(gv('sets'))||1,
    duration: gv('duration')||rec.duration, distance: parseFloat(gv('distance'))||0,
    level: parseInt(gv('level'))||0, notes: gv('notes')||'', link: gv('link')||'',
    status: finalStatus
  };
  updated.points = calcPoints(updated);

  await db.collection("users").doc(currentUser.uid).collection("records").doc(backendId).update(updated);
  const result = { isOk: true };
  closeModal();
  if(result.isOk) showToast('已更新！', 'success');
  else showToast('更新失敗', 'error');
}

async function adminSubmitPoints() {
  const pts = parseInt(document.getElementById('adminPointsInput').value);
  const notes = document.getElementById('adminPointsNote').value || '系統調整';
  if(isNaN(pts)) return;
  const rec = { record_type: 'point_adjustment', date: toDateStr(new Date()), points: pts, notes: notes, timestamp: new Date().toISOString() };
  await db.collection("users").doc(adminSelectedUid).collection("records").add(rec);
  closeModal(); showToast('積分已調整', 'success'); selectAdminUser(adminSelectedUid);
}

// -- Admin: 重新計算歷史積分 --
window.adminRecalculatePoints = async () => {
  if(!confirm('⚠️ 確定要根據最新公式，重新計算呢位用戶所有歷史運動記錄嘅分數？\n(注意：此動作將會覆蓋舊分數，無法復原)')) return;
  
  const btn = document.querySelector('button:active') || document.body;
  btn.style.opacity = '0.5';
  showToast('正在逐筆重新計算中...', 'info');

  try {
    let updatedCount = 0;
    // 搵出該用戶所有運動記錄 (不包括換領或系統加減分)
    const workouts = adminSelectedUserRecs.filter(r => r.record_type === 'workout');
    
    for(const w of workouts) {
      const newPoints = calcPoints(w);
      // 如果新計出嚟嘅分 同 舊分唔同，就 Update 落 Firebase
      if(w.points !== newPoints) {
        await db.collection("users").doc(adminSelectedUid).collection("records").doc(w.__backendId).update({ points: newPoints });
        updatedCount++;
      }
    }
    
    btn.style.opacity = '1';
    showToast(`✅ 成功重算！共修正了 ${updatedCount} 筆記錄`, 'success');
    selectAdminUser(adminSelectedUid); // 重新載入資料並刷新畫面
  } catch(e) {
    console.error(e);
    showToast('重算失敗，請檢查網絡', 'error');
    btn.style.opacity = '1';
  }
};

window._adminNewReward = () => {
  const name = prompt('獎勵名稱 (例如: 咖啡):'); if(!name) return;
  const emoji = prompt('Emoji (例如: ☕):') || '🎁';

window._adminEditReward = (id) => {
  const rw = adminSelectedUserRewards.find(r => r.id === id);
  if(!rw) return;
  const newName = prompt('修改獎勵名稱:', rw.name);
  if(!newName || !newName.trim()) return;
  const newEmoji = prompt('修改 Emoji:', rw.emoji) || '🎁';
  const costStr = prompt('修改所需積分:', rw.cost);
  if(costStr === null) return;
  const newCost = parseInt(costStr);
  if(isNaN(newCost)) return;

  rw.name = newName.trim();
  rw.emoji = newEmoji;
  rw.cost = newCost;
  adminSaveRewardsToDB();
};

window._adminDeleteReward = (id) => {
  if(!confirm('確定刪除此獎勵？')) return;
  adminSelectedUserRewards = adminSelectedUserRewards.filter(r => r.id !== id);
  adminSaveRewardsToDB();
};

// ========== 📚 書架渲染功能 (進化版：全方位時間軸支援) ==========
function renderBooks() {
  const grid = document.getElementById('bookshelfGrid');
  const searchVal = document.getElementById('shelfSearchInput')?.value.toLowerCase() || '';
  const categoryVal = document.getElementById('shelfCategoryFilter')?.value || 'all';
  const sortVal = document.getElementById('shelfSortOrder')?.value || 'recent';
  
  document.getElementById('totalBooksCount').textContent = window.allBooks.length;
  
  // 保持垂直佈局以支援月份分組
  grid.className = "flex flex-col gap-6 pb-24 relative"; 

  if (window.allBooks.length === 0) {
    grid.innerHTML = `
      <div class="col-span-2 text-center py-12 text-slate-400 card-enter">
        <div class="text-5xl mb-3">📇</div>
        <p class="font-bold">書架仲係空空如也</p>
        <p class="text-xs mt-1">撳右下角新增第一本書啦！</p>
      </div>`;
    return;
  }

  // 1. 動態更新分類選單
  updateCategoryDropdown();

  // 2. 執行過濾 (搜尋框 + 分類選單)
  let filtered = window.allBooks.filter(book => {
    const title = (book.title || '').toLowerCase();
    const author = (book.author || '').toLowerCase();
    const matchesSearch = title.includes(searchVal) || author.includes(searchVal);
    const matchesCategory = categoryVal === 'all' || book.category === categoryVal;
    return matchesSearch && matchesCategory;
  });

  // 3. 基礎分組：正在閱讀 vs 已讀完
  const readingBooks = filtered.filter(b => b.status === 'reading');
  let finishedBooks = filtered.filter(b => b.status === 'finished');

  let html = '';

  // 🚀 A. 渲染「正在閱讀」區塊
  if (readingBooks.length > 0) {
    html += `
      <div class="card-enter">
        <div class="flex items-center gap-2 mb-4 px-1">
          <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span>
          <h2 class="font-extrabold text-slate-800 text-base">正在閱讀</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
          ${readingBooks.map(book => renderSingleBookCard(book)).join('')}
        </div>
      </div>`;
  }

  // 🚀 B. 渲染「已讀完」區塊 (處理時間軸排序)
  const isTimelineMode = (sortVal === 'recent' || sortVal === 'oldest');

  if (isTimelineMode) {
    // 💡 時間軸模式：按月分組
    const monthlyGroups = {};
    finishedBooks.forEach(book => {
      const month = book.endDate ? book.endDate.substring(0, 7) : '日期不詳';
      if (!monthlyGroups[month]) monthlyGroups[month] = [];
      monthlyGroups[month].push(book);
    });

    // 排序月份清單
    let sortedMonths = Object.keys(monthlyGroups).sort(); // 預設 ASC (舊至新)
    if (sortVal === 'recent') sortedMonths.reverse(); // 最近讀完則 DESC (新至舊)

    sortedMonths.forEach(month => {
      const groupBooks = monthlyGroups[month];
      
      // 🌟 重要：同月內的書也要跟隨排序方向
      groupBooks.sort((a, b) => {
        const dateA = a.endDate || '';
        const dateB = b.endDate || '';
        return sortVal === 'recent' ? dateB.localeCompare(dateA) : dateA.localeCompare(dateB);
      });

      const parts = month.split('-');
      const displayMonth = month === '日期不詳' ? month : `${parts[0]}年 ${parseInt(parts[1])}月`;

      html += `
        <div class="card-enter mb-2">
          <div class="flex items-center gap-3 mb-4 px-1">
            <div class="bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100 flex items-center gap-1.5">
              <i data-lucide="${sortVal === 'recent' ? 'calendar' : 'history'}" class="w-3.5 h-3.5 text-primary"></i>
              <h2 class="font-extrabold text-primary text-sm">${displayMonth}</h2>
            </div>
            <div class="h-[1px] flex-1 bg-slate-200/60"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            ${groupBooks.map(book => renderSingleBookCard(book)).join('')}
          </div>
        </div>`;
    });
  } else {
    // 💡 書名 A-Z 模式：純列表顯示
    finishedBooks.sort((a, b) => a.title.localeCompare(b.title, 'zh-HK'));
    html += `
      <div class="card-enter">
        <div class="flex items-center gap-2 mb-4 px-1">
          <i data-lucide="sort-asc" class="w-4 h-4 text-slate-400"></i>
          <h2 class="font-extrabold text-slate-800 text-base">按書名 A-Z 排序</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
          ${finishedBooks.map(book => renderSingleBookCard(book)).join('')}
        </div>
      </div>`;
  }

  grid.innerHTML = html || `<div class="text-center py-10 text-slate-400 font-bold">搵唔到符合條件嘅書 🔍</div>`;
  lucide.createIcons();
}

// 🌟 輔助：自動根據目前書架嘅書，更新「分類篩選」下拉選單
function updateCategoryDropdown() {
  const select = document.getElementById('shelfCategoryFilter');
  if(!select) return;
  const currentSelection = select.value;
  
  // 攞出所有非空分類並去重排序
  const categories = [...new Set(window.allBooks.map(b => b.category).filter(Boolean))].sort();
  
  let options = `<option value="all">所有分類</option>`;
  categories.forEach(cat => {
    options += `<option value="${cat}" ${currentSelection === cat ? 'selected' : ''}>${cat}</option>`;
  });
  
  select.innerHTML = options;
}

// 抽取卡片渲染邏輯，確保樣式同原本一模一樣，並優化日期顯示格式
function renderSingleBookCard(book) {
  const coverHtml = book.coverUrl 
    ? `<img src="${book.coverUrl}" class="w-24 aspect-[2/3] object-cover rounded-sm shadow-[4px_4px_12px_rgba(0,0,0,0.15)] relative z-10" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect width=\\'100\\' height=\\'100\\' fill=\\'%23e2e8f0\\'/><text x=\\'50%\\' y=\\'50%\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' font-size=\\'20\\' fill=\\'%2394a3b8\\'>無圖片</text></svg>'">`
    : `<div class="w-24 aspect-[2/3] bg-slate-200 rounded-sm flex items-center justify-center text-3xl shadow-[4px_4px_12px_rgba(0,0,0,0.15)] relative z-10">📗</div>`;

  // 🌟 核心修正：處理「已讀完」嘅顯示字串 (格式：d/m 已讀完)
  let displayFinishedDate = '已讀完';
  if (book.endDate) {
    const parts = book.endDate.split('-'); // 假設係 YYYY-MM-DD
    if (parts.length >= 3) {
      const day = parseInt(parts[2]);   // 攞返日，自動走 0
      const month = parseInt(parts[1]); // 攞返月，自動走 0
      displayFinishedDate = `${day}/${month} 已讀完`;
    }
  }

  // 渲染 HTML 按鈕
  let statusBadgeHtml = '';
  if (book.status === 'reading') {
    statusBadgeHtml = `
      <button onclick="event.stopPropagation(); quickFinishBook('${book.id}', '${book.title.replace(/'/g,"\\'")}')" class="group inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-md bg-orange-50 text-orange-600 border border-orange-200 hover:bg-orange-100 transition-colors shadow-sm relative z-20">
        <span class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse group-hover:hidden"></span>
        <i data-lucide="check-circle" class="w-2.5 h-2.5 hidden group-hover:block text-orange-600"></i>
        <span class="group-hover:hidden">閱讀中</span>
        <span class="hidden group-hover:block">標記讀完</span>
      </button>`;
  } else {
    statusBadgeHtml = `
      <button onclick="event.stopPropagation(); promptRevertToReading('${book.id}', '${book.title.replace(/'/g,"\\'")}')" class="group inline-flex items-center gap-1.5 text-[10px] font-bold px-2 py-0.5 rounded-md bg-green-50 text-green-600 border border-green-200 hover:bg-sky-50 hover:text-sky-600 transition-colors shadow-sm relative z-20">
        <span class="w-1.5 h-1.5 rounded-full bg-green-500 group-hover:hidden"></span>
        <i data-lucide="rotate-ccw" class="w-2.5 h-2.5 hidden group-hover:block text-sky-500"></i>
        <span class="group-hover:hidden">${displayFinishedDate}</span>
        <span class="hidden group-hover:block">還原狀態</span>
      </button>`;
  }

  const categoryTagHtml = book.category 
    ? `<div class="mt-1.5"><span class="inline-flex items-center gap-0.5 text-[9px] font-bold bg-sky-50 text-sky-600 px-1.5 py-0.5 rounded border border-sky-100 truncate max-w-full"><i data-lucide="tag" class="w-2.5 h-2.5 flex-shrink-0"></i>${book.category}</span></div>` 
    : '';

  return `
    <div 
      ontouchstart="window.handleBookPressStart(event, '${book.id}')" 
      ontouchend="window.handleBookPressEnd()" 
      ontouchmove="window.handleBookPressEnd()" 
      onmousedown="window.handleBookPressStart(event, '${book.id}')" 
      onmouseup="window.handleBookPressEnd()" 
      onmouseleave="window.handleBookPressEnd()" 
      onclick="window.handleBookClick(event, '${book.id}')" 
      oncontextmenu="window.showBookMenu(event, '${book.id}'); return false;"
      class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow cursor-pointer border border-slate-100 flex flex-col relative"
      style="-webkit-touch-callout: none; user-select: none;">
      <div class="bg-gradient-to-b from-slate-50 to-slate-100 pt-5 pb-3 flex justify-center items-end relative min-h-[150px]">
        <div class="absolute bottom-0 left-0 w-full h-1.5 bg-slate-200/60 border-t border-slate-200"></div>
        ${coverHtml}
      </div>
      <div class="p-3 flex-1 flex flex-col bg-white">
        <h3 class="font-extrabold text-sm text-slate-800 truncate mb-1">${book.title}</h3>
        <p class="text-[11px] font-bold text-slate-400 truncate">${book.author || '未知作者'}</p>
        ${categoryTagHtml}
        <div class="mt-auto pt-3 flex items-center">
          ${statusBadgeHtml}
        </div>
      </div>
    </div>`;
}

  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  
  let html = `

        </div>

async function confirmQuickFinish(bookId) {
  const endDate = document.getElementById('quickFinishDate').value;
  if(!endDate) { 
    showToast('請選擇結束日期', 'error'); 
    return; 
  }
  
  const btn = document.querySelector('.modal-box button.bg-green-500');
  if(btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 處理中...'; }
  lucide.createIcons();
  
  try {
    // 直寫入 Firebase，只需 Update 狀態同結束日期
    await db.collection("users").doc(currentUser.uid).collection("books").doc(bookId).update({
      status: 'finished',
      endDate: endDate
    });
    
    closeModal();
    showToast('恭喜讀完一本書！🎉', 'success');
    
    // 震動回饋 (Positive Reinforcement)，恭喜用家完成任務
    if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
    
  } catch(e) {
    console.error(e);
    showToast('更新失敗，請檢查網絡', 'error');
  }
}

// ========== 萬能自動抓取功能 (純 Google Books 專業版) ==========

// 🔑 你的 Google Books API Key (申請後貼喺度，保留引號)
const GOOGLE_BOOKS_API_KEY = 'AIzaSyAV4z0YN0lZVZe1BEg_uIQXcKlFNLYA2sQ'; 

async function fetchBookData() {
  const searchInput = document.getElementById('bookSearchInput');
  const query = searchInput.value.trim();

  if (!query) {
    showToast('請先輸入書名或 ISBN', 'error');
    return;
  }

  // 智能判斷：係咪 ISBN
  const isISBN = /^[0-9\-]+$/.test(query);
  const cleanISBN = isISBN ? query.replace(/[- ]/g, '') : '';

  // UX 設計：轉換按鈕為 Loading 狀態
  const searchBtn = searchInput.nextElementSibling;
  const originalBtnHTML = searchBtn.innerHTML;
  searchBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 處理中`;
  searchBtn.disabled = true;
  lucide.createIcons();

  try {
    let bookFound = false;
    let bookData = { title: '', author: '', desc: '', cover: '' };

    // 構建 Google Books API 網址
    const gbQuery = isISBN ? `isbn:${cleanISBN}` : encodeURIComponent(query);
    let apiUrl = `https://www.googleapis.com/books/v1/volumes?q=${gbQuery}&maxResults=1`;
    
    // 如果有輸入 API Key，就加落條 URL 度解鎖限制
    if (GOOGLE_BOOKS_API_KEY && GOOGLE_BOOKS_API_KEY.trim() !== '') {
      apiUrl += `&key=${GOOGLE_BOOKS_API_KEY}`;
    }

    const gbResponse = await fetch(apiUrl);

    // 🚨 UX 防呆：攔截 Google 嘅「限流」封鎖 (HTTP 429)
    if (gbResponse.status === 429) {
      showToast('⚠️ Google 搜尋太頻繁被限制，請稍後再試或加入 API Key', 'error');
      // 復原按鈕狀態
      searchBtn.innerHTML = originalBtnHTML;
      searchBtn.disabled = false;
      lucide.createIcons();
      return; // 終止執行
    }

    const gbData = await gbResponse.json();

    if (gbData.totalItems > 0 && gbData.items) {
      const info = gbData.items[0].volumeInfo;
      bookData.title = info.title || '';
      bookData.author = info.authors ? info.authors.join(', ') : '';
      bookData.desc = info.description || '';
      bookData.category = info.categories && info.categories.length > 0 ? info.categories[0] : '';
      if (info.imageLinks && info.imageLinks.thumbnail) {
        // 優化圖片網址：轉 https 並移除奇怪捲角特效
        bookData.cover = info.imageLinks.thumbnail.replace(/^http:\/\//i, 'https://').replace('&edge=curl', '');
      }
      bookFound = true;
    }

    // 🎨 UI/UX 處理結果
    if (bookFound) {
      document.getElementById('bookTitle').value = bookData.title;
      document.getElementById('bookAuthor').value = bookData.author;
      document.getElementById('bookDesc').value = bookData.desc;
      document.getElementById('bookCover').value = bookData.cover;
      document.getElementById('bookCategory').value = bookData.category; // 🌟 補返呢行：自動填寫分類

      showToast('🎉 成功從 Google Books 搵到資料！', 'success');

      // UX：綠色高光閃爍提示 (加埋 bookCategory)
      ['bookTitle', 'bookAuthor', 'bookCategory', 'bookCover', 'bookDesc'].forEach(id => {
        const el = document.getElementById(id);
        if (el && el.value) {
          el.classList.add('bg-green-50', 'ring-2', 'ring-green-400');
          setTimeout(() => el.classList.remove('bg-green-50', 'ring-2', 'ring-green-400'), 1200);
        }
      });
    } else {
      showToast('Google 書庫搵唔到呢本書呀，麻煩自己入一入 🥲', 'error');
      // UX：自動聚焦到書名輸入框，並加入橙色高光提示
      const titleInput = document.getElementById('bookTitle');
      titleInput.focus();
      titleInput.classList.add('bg-orange-50', 'ring-2', 'ring-orange-400');
      setTimeout(() => titleInput.classList.remove('bg-orange-50', 'ring-2', 'ring-orange-400'), 1500);
    }

  } catch (error) {
    console.error("Error in Google Books fetch:", error);
    showToast('網絡錯誤，請檢查連線再試', 'error');
  } finally {
    // 確保無論成功定失敗，都會復原按鈕
    searchBtn.innerHTML = originalBtnHTML;
    searchBtn.disabled = false;
    lucide.createIcons();
  }
}

async function saveNewBook() {
  const title = document.getElementById('bookTitle').value.trim();
  if (!title) { showToast('請填寫書名', 'error'); return; }
  
  const initialNoteText = document.getElementById('bookNotes').value.trim();
  let notesArray = [];
  if (initialNoteText) {
    const now = new Date();
    notesArray.push({
      id: 'n_' + Date.now(),
      date: `📅 ${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`,
      text: initialNoteText
    });
  }

  const bookData = {
    title: title, 
    author: document.getElementById('bookAuthor').value.trim(),
    category: document.getElementById('bookCategory').value.trim(),
    coverUrl: document.getElementById('bookCover').value.trim(),
    startDate: document.getElementById('bookStartDate').value,
    endDate: document.getElementById('bookEndDate').value,
    status: document.getElementById('bookStatus').value,
    description: document.getElementById('bookDesc').value.trim(), // 👈 獨立儲存簡介
    notes: notesArray,
    timestamp: new Date().toISOString()
  };

  try {
    await db.collection("users").doc(currentUser.uid).collection("books").add(bookData);
    closeModal(); showToast('書籍已加入書架！', 'success');
  } catch(e) { showToast('儲存失敗', 'error'); }
}

  } else {
    container.classList.add('hidden');
    document.getElementById(`quickNoteText_${bookId}`).value = '';
  }
}

async function saveQuickNote(bookId) {
  const book = window.allBooks.find(b => b.id === bookId);
  if (!book) return;
  const textArea = document.getElementById(`quickNoteText_${bookId}`);
  const newText = textArea.value.trim();
  if (!newText) { toggleQuickNoteInput(bookId); return; }

  const btn = document.querySelector(`#quickNoteContainer_${bookId} button.bg-sky-500`);
  btn.disabled = true; btn.textContent = '處理中...';

  const now = new Date();
  const dateStr = `📅 ${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  let notesArray = Array.isArray(book.notes) ? [...book.notes] : [];
  if (typeof book.notes === 'string' && book.notes.trim() !== '') {
    notesArray.push({ id: 'legacy', date: '📅 舊版筆記', text: book.notes });

  notesArray.unshift({

    date: dateStr,
    text: newText
  });

window.updateModalTheme = (statusSelectId) => {
  const statusSelect = document.getElementById(statusSelectId);

  const status = statusSelect.value;
  
  // 1. 一般輸入框 (只換邊框色)
  const elements = document.querySelectorAll('.modal-box input:not(#bookSearchInput), .modal-box select, .modal-box textarea');
  elements.forEach(el => {
    el.classList.remove('border-sky2', 'focus:border-primary', 'border-orange-300', 'focus:border-orange-500', 'border-green-300', 'focus:border-green-500', 'border-pink-300', 'focus:border-pink-500');
    if (status === 'reading') el.classList.add('border-orange-300', 'focus:border-orange-500');
    else if (status === 'finished') el.classList.add('border-green-300', 'focus:border-green-500');
    else if (status === 'wishlist') el.classList.add('border-pink-300', 'focus:border-pink-500');
    else el.classList.add('border-sky2', 'focus:border-primary'); // 預設藍色
  });

  // 2. 萬能搜尋 / 重新抓取區塊 (換底色、邊框色、文字色、按鈕色)
  const isEdit = statusSelectId === 'editBookStatus';
  const container = document.getElementById(isEdit ? 'editThemeContainer' : 'searchThemeContainer');
  const label = document.getElementById(isEdit ? 'editThemeLabel' : 'searchThemeLabel');
  const btn = document.getElementById(isEdit ? 'editThemeBtn' : 'searchThemeBtn');
  const searchInput = document.getElementById('bookSearchInput');

  if (container) {
    container.classList.remove('bg-orange-50', 'border-orange-100', 'bg-green-50', 'border-green-100', 'bg-pink-50', 'border-pink-100');
    if (status === 'reading') container.classList.add('bg-orange-50', 'border-orange-100');
    else if (status === 'finished') container.classList.add('bg-green-50', 'border-green-100');
    else if (status === 'wishlist') container.classList.add('bg-pink-50', 'border-pink-100');
  }
  if (label) {
    label.classList.remove('text-orange-600', 'text-green-600', 'text-pink-600');
    if (status === 'reading') label.classList.add('text-orange-600');
    else if (status === 'finished') label.classList.add('text-green-600');
    else if (status === 'wishlist') label.classList.add('text-pink-600');
  }
  if (btn) {
    btn.classList.remove('bg-orange-500', 'hover:bg-orange-600', 'bg-green-500', 'hover:bg-green-600', 'bg-pink-500', 'hover:bg-pink-600');
    if (status === 'reading') btn.classList.add('bg-orange-500', 'hover:bg-orange-600');
    else if (status === 'finished') btn.classList.add('bg-green-500', 'hover:bg-green-600');
    else if (status === 'wishlist') btn.classList.add('bg-pink-500', 'hover:bg-pink-600');
  }
  if (searchInput) {
    searchInput.classList.remove('border-orange-200', 'focus:border-orange-400', 'border-green-200', 'focus:border-green-400', 'border-pink-200', 'focus:border-pink-400');
    if (status === 'reading') searchInput.classList.add('border-orange-200', 'focus:border-orange-400');
    else if (status === 'finished') searchInput.classList.add('border-green-200', 'focus:border-green-400');
    else if (status === 'wishlist') searchInput.classList.add('border-pink-200', 'focus:border-pink-400');
  }
};

// ========== 🔄 閱讀狀態與日期雙向智能聯動 ==========
window.syncDateAndStatus = (source, dateInputId, statusSelectId) => {
  const dateInput = document.getElementById(dateInputId);
  const statusSelect = document.getElementById(statusSelectId);
  
  if (source === 'date') {
    // 當用家修改「結束日期」
    if (dateInput.value) {
      statusSelect.value = 'finished';
    } else if (statusSelect.value === 'finished') {
      statusSelect.value = 'reading';
    }
  } else if (source === 'status') {
    // 當用家修改「狀態」選單
    if (statusSelect.value === 'finished' && !dateInput.value) {
      // 轉為已讀完 -> 自動填入今日作為結束日期
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      dateInput.value = todayStr;
    } else if (statusSelect.value === 'reading' || statusSelect.value === 'wishlist') {
      // 轉為閱讀中或有興趣 -> 清空結束日期
      dateInput.value = '';
      
      // 💡 修正：如果轉為「有興趣」，連帶清空「開始日期」
      if (statusSelect.value === 'wishlist') {
        let startDateInputId = '';
        if (dateInputId === 'bookEndDate') startDateInputId = 'bookStartDate';
        else if (dateInputId === 'editBookEndDate') startDateInputId = 'editBookStartDate';
        
        if (startDateInputId) {
          const startDateInput = document.getElementById(startDateInputId);
          if (startDateInput) startDateInput.value = '';
        }
      }
    }
  }
  
  // 💡 狀態轉完之後，觸發換色
  window.updateModalTheme(statusSelectId);
};

// ========== 🔄 編輯模式：一鍵重新抓取資料 ==========
window.reFetchBookData = async (bookId) => {
  const currentTitle = document.getElementById('editBookTitle').value.trim();
  if (!currentTitle) {
    showToast('請先確保有書名，才能進行搜尋', 'error');
    return;
  }

  const btn = event.currentTarget;
  const originalHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> 搜尋中`;
  lucide.createIcons();

  try {
    const apiUrl = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(currentTitle)}&maxResults=1${GOOGLE_BOOKS_API_KEY ? `&key=${GOOGLE_BOOKS_API_KEY}` : ''}`;
    const response = await fetch(apiUrl);
    
    if (response.status === 429) {
      showToast('⚠️ Google 搜尋太頻繁，請稍後再試', 'error');
      return;
    }

    const data = await response.json();

    if (data.totalItems > 0 && data.items) {
      const info = data.items[0].volumeInfo;
      
      // 自動填寫編輯框
      document.getElementById('editBookTitle').value = info.title || currentTitle;
      document.getElementById('editBookAuthor').value = info.authors ? info.authors.join(', ') : '';
      document.getElementById('editBookCategory').value = info.categories ? info.categories[0] : '';
      document.getElementById('editBookDesc').value = info.description || '';
      if (info.imageLinks && info.imageLinks.thumbnail) {
        document.getElementById('editBookCover').value = info.imageLinks.thumbnail.replace(/^http:\/\//i, 'https://').replace('&edge=curl', '');
      }

      showToast('🎉 資料已更新，記得撳儲存！', 'success');

      // UX：為變動嘅欄位加入高光閃爍
      ['editBookTitle', 'editBookAuthor', 'editBookCategory', 'editBookCover', 'editBookDesc'].forEach(id => {
        const el = document.getElementById(id);
        if (el && el.value) {
          el.classList.add('bg-green-50', 'ring-2', 'ring-green-400');
          setTimeout(() => el.classList.remove('bg-green-50', 'ring-2', 'ring-green-400'), 1200);
        }
      });
    } else {
      showToast('搵唔到更詳細嘅資料 🥲', 'info');
    }
  } catch (error) {
    console.error("Re-fetch error:", error);
    showToast('連線失敗', 'error');
  } finally {
    btn.innerHTML = originalHTML;
    btn.disabled = false;
    lucide.createIcons();
  }
};

// ========== 📥 匯出書架數據到 Excel (CSV) (筆記自動分開 15 格) ==========
function exportBooksToCSV() {
  if (!window.allBooks || window.allBooks.length === 0) {
    showToast('書架仲未有記錄可以匯出', 'error');
    return;
  }

  // 1. 準備 CSV 標題列 (基本資料 + 15 格筆記)
  const baseHeaders = ['書名', '作者', '分類', '開始日期', '結束日期', '狀態', '官方簡介', '筆記數量'];
  const noteHeaders = [];
  for (let i = 1; i <= 15; i++) {
    noteHeaders.push(`筆記 ${i}`);
  }
  const headers = [...baseHeaders, ...noteHeaders];
  
  // 🌟 加入 UTF-8 BOM (\uFEFF)，確保用 Excel 打開中文字唔會變亂碼
  let csvContent = "\uFEFF" + headers.join(',') + '\n'; 

  // 2. 轉換書籍數據
  window.allBooks.forEach(book => {
    // 處理基本資料 (防呆：處理雙引號)
    const title = `"${(book.title || '').replace(/"/g, '""')}"`;
    const author = `"${(book.author || '').replace(/"/g, '""')}"`;
    const category = `"${(book.category || '').replace(/"/g, '""')}"`;
    const startDate = `"${book.startDate || ''}"`;
    const endDate = `"${book.endDate || ''}"`;
    const status = book.status === 'reading' ? '"閱讀中"' : '"已讀完"';
    const desc = `"${(book.description || '').replace(/"/g, '""')}"`;
    
    // 💡 處理筆記內容 (分配去 15 個獨立格)
    let notesCount = 0;
    // 預設 15 格空位，用 "" 代表 Excel 入面嘅吉格
    let noteColumns = new Array(15).fill('""'); 

    if (Array.isArray(book.notes) && book.notes.length > 0) {
      notesCount = book.notes.length;
      
      // 處理頭 14 條筆記，獨立放入格仔
      for (let i = 0; i < 14; i++) {
        if (i < notesCount) {
          const noteText = `[${book.notes[i].date}]\n${book.notes[i].text}`;
          noteColumns[i] = `"${noteText.replace(/"/g, '""')}"`;
        }
      }
      
      // 處理第 15 條或以上嘅筆記 (如果有嘅話，全部合拼塞落第 15 格)
      if (notesCount >= 15) {
        // 將第 15 條 (index 14) 開始嘅所有筆記斬出嚟合拼
        const overflowNotes = book.notes.slice(14);
        const combinedText = overflowNotes.map(n => `[${n.date}]\n${n.text}`).join('\n\n---\n\n');
        noteColumns[14] = `"${combinedText.replace(/"/g, '""')}"`;
      }
      
    } else if (typeof book.notes === 'string' && book.notes.trim() !== '') {
      // 支援極舊版嘅單一字串筆記，擺落第 1 格
      notesCount = 1;
      noteColumns[0] = `"${book.notes.replace(/"/g, '""')}"`;
    }

    // 將基本資料、筆記數量 同埋 15 格筆記 結合成一行
    const row = [title, author, category, startDate, endDate, status, desc, notesCount, ...noteColumns];
    csvContent += row.join(',') + '\n';
  });

  // 3. 建立並觸發下載檔案
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  
  // 生成今日日期做檔名 (例如：DailyPlus_Reading_20260503.csv)
  const today = new Date();
  const dateString = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  
  link.setAttribute('href', url);
  link.setAttribute('download', `DailyPlus_Reading_${dateString}.csv`);
  document.body.appendChild(link);
  link.click(); // 模擬點擊下載
  document.body.removeChild(link);
  
  showToast('✅ 成功下載 Excel 檔案！', 'success');
}
// ========== 🧭 閱讀模塊導航控制 ==========
let currentReadPage = 'shelf';

window.switchReadPage = (page) => {
  currentReadPage = page;
  const pages = ['shelf', 'wishlist', 'settings'];
  
  pages.forEach(p => {
    document.getElementById('read-page-'+p).classList.add('hidden');
    document.getElementById('read-page-'+p).classList.remove('block');
    // 底部導覽列保持原汁原味嘅橙色
    document.getElementById('read-nav-'+p).className = `flex flex-col items-center gap-0.5 px-4 py-1 rounded-xl transition-all ${p === page ? 'text-orange-500 bg-orange-50' : 'text-slate-400'}`;
  });
  
  document.getElementById('read-page-'+page).classList.remove('hidden');
  document.getElementById('read-page-'+page).classList.add('block');
  
  // 處理 FAB 按鈕顯示與頁面渲染
  const fab = document.getElementById('readFab');
  if(page === 'settings') {
     fab.classList.add('hidden');
     window.renderReadSettings();
  } else {
     fab.classList.remove('hidden');
     
     // 💡 淨係幫呢粒「＋」號動態換色
     fab.classList.remove('bg-orange-500', 'hover:bg-orange-600', 'bg-pink-500', 'hover:bg-pink-600');
     
     if(page === 'shelf') {
       fab.classList.add('bg-orange-500', 'hover:bg-orange-600');
       renderBooks();
     } else if(page === 'wishlist') {
       fab.classList.add('bg-pink-500', 'hover:bg-pink-600');
       window.renderWishlist();
     }
  }
  lucide.createIcons();
};

// ========== 🧐 渲染「有興趣」清單 ==========
window.renderWishlist = () => {
  const container = document.getElementById('read-page-wishlist');
  const wishlistBooks = window.allBooks.filter(b => b.status === 'wishlist').sort((a,b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
  
  let html = `<div class="flex items-center gap-2 mb-4 px-1"><span class="w-2 h-2 rounded-full bg-pink-500"></span><h2 class="font-extrabold text-slate-800 text-base">有興趣清單 (${wishlistBooks.length})</h2></div>`;
  
  if(wishlistBooks.length === 0) {
     html += `<div class="text-center py-12 text-slate-400 card-enter"><div class="text-5xl mb-3">🧐</div><p class="font-bold">仲未有心水好書</p></div>`;
  } else {
     html += `<div class="grid grid-cols-2 gap-4 pb-6">`;
     html += wishlistBooks.map(book => {
        const coverHtml = book.coverUrl 
          ? `<img src="${book.coverUrl}" class="w-24 aspect-[2/3] object-cover rounded-sm shadow-[4px_4px_12px_rgba(0,0,0,0.15)] relative z-10" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect width=\\'100\\' height=\\'100\\' fill=\\'%23e2e8f0\\'/><text x=\\'50%\\' y=\\'50%\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' font-size=\\'20\\' fill=\\'%2394a3b8\\'>無圖片</text></svg>'">`
          : `<div class="w-24 aspect-[2/3] bg-slate-200 rounded-sm flex items-center justify-center text-3xl shadow-[4px_4px_12px_rgba(0,0,0,0.15)] relative z-10">📗</div>`;
        
        return `
        <div 
          ontouchstart="window.handleBookPressStart(event, '${book.id}')" 
          ontouchend="window.handleBookPressEnd()" 
          ontouchmove="window.handleBookPressEnd()" 
          onmousedown="window.handleBookPressStart(event, '${book.id}')" 
          onmouseup="window.handleBookPressEnd()" 
          onmouseleave="window.handleBookPressEnd()" 
          onclick="window.handleBookClick(event, '${book.id}')" 
          oncontextmenu="window.showBookMenu(event, '${book.id}'); return false;"
          class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow cursor-pointer border border-slate-100 flex flex-col relative card-enter"
          style="-webkit-touch-callout: none; user-select: none;">
          <div class="bg-gradient-to-b from-slate-50 to-slate-100 pt-5 pb-3 flex justify-center items-end relative min-h-[150px]">
            <div class="absolute bottom-0 left-0 w-full h-1.5 bg-slate-200/60 border-t border-slate-200"></div>
            ${coverHtml}
          </div>
          <div class="p-3 flex-1 flex flex-col bg-white">
            <h3 class="font-extrabold text-sm text-slate-800 truncate mb-1">${book.title}</h3>
            <p class="text-[11px] font-bold text-slate-400 truncate">${book.author || '未知作者'}</p>
            <div class="mt-auto pt-3 flex items-center">
               <button onclick="event.stopPropagation(); promptStartReading('${book.id}', '${book.title.replace(/'/g,"\\'")}')" class="w-full bg-orange-50 hover:bg-orange-100 text-orange-600 border border-orange-200 text-[11px] font-bold py-1.5 rounded-lg transition-colors flex items-center justify-center gap-1 shadow-sm relative z-20">
                 <i data-lucide="play-circle" class="w-3.5 h-3.5"></i> 開始閱讀
               </button>
            </div>
          </div>
        </div>`;
     }).join('');
     html += `</div>`;
  }
  container.innerHTML = html;
  lucide.createIcons();
};

// 🌟 從「有興趣」轉移到「書架 (閱讀中)」的確認畫面
window.promptStartReading = (bookId, title) => {
  let html = `
    <div class="modal-box text-left" onclick="event.stopPropagation()">
      <div class="flex items-center gap-2 mb-1">
        <div class="w-8 h-8 rounded-full bg-orange-100 text-orange-500 flex items-center justify-center flex-shrink-0">
          <i data-lucide="play-circle" class="w-5 h-5"></i>
        </div>
        <h3 class="font-extrabold text-lg text-slate-800">確認開始閱讀？</h3>
      </div>
      
      <p class="text-sm font-bold text-slate-500 mb-4 truncate line-clamp-1">《${title}》</p>
      
      <div class="bg-slate-50 p-3 rounded-xl mb-4 border border-slate-100">
        <p class="text-[11px] font-bold text-slate-500 text-center">本書將會移至書架，並記錄今日為開始日期。</p>
      </div>
      
      <button onclick="confirmStartReading('${bookId}')" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition shadow-sm mb-2 flex items-center justify-center gap-1">
        開始閱讀 📖
      </button>
      <button onclick="closeModal()" class="w-full bg-white border border-slate-200 text-slate-600 font-bold py-2.5 rounded-xl hover:bg-slate-50 transition">
        取消
      </button>
    </div>
  `;
  showModal(html);
  lucide.createIcons();
};

window.confirmStartReading = async (bookId) => {
  const btn = document.querySelector('.modal-box button.bg-orange-500');
  if(btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 處理中...'; }
  lucide.createIcons();
  
  const todayStr = toDateStr(new Date());
  try {
    await db.collection("users").doc(currentUser.uid).collection("books").doc(bookId).update({
      status: 'reading',
      startDate: todayStr
    });
    closeModal();
    showToast('已轉移至書架，開始閱讀！📚', 'success');
  } catch(e) {
    console.error(e);
    showToast('更新失敗，請檢查網絡', 'error');
  }
};

// ========== ⚙️ 渲染設定頁面 ==========
window.renderReadSettings = () => {
  const container = document.getElementById('read-page-settings');
  // 我將之前寫好嘅 Export Excel 功能搬咗嚟呢度！
  let html = `<h2 class="font-extrabold text-xl text-primary mb-4">⚙️ 閱讀設定</h2>
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-3 card-enter">
      <h3 class="font-bold text-sm text-primary mb-3">📥 數據管理</h3>
      <p class="text-xs text-slate-500 mb-4">你可以將整個書架嘅記錄（包含所有筆記內容）匯出成 Excel (CSV) 檔案備份。</p>
      <button onclick="exportBooksToCSV()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-sm flex items-center justify-center gap-2">
        <i data-lucide="download" class="w-5 h-5"></i> 下載全部數據
      </button>
    </div>`;
  container.innerHTML = html;
  lucide.createIcons();
};

// 🛠️ 最後修補：攔截書架唔好顯示「有興趣」嘅書
const originalRenderBooks = renderBooks;
renderBooks = function() {
  // 將 window.allBooks 臨時偷龍轉鳳，過濾掉 'wishlist'，等原本個 renderBooks 照常運作
  const backup = window.allBooks;
  window.allBooks = backup.filter(b => b.status !== 'wishlist');
  originalRenderBooks(); // 行返你本身寫好嘅邏輯
  window.allBooks = backup; // 復原
  
  // 更新實時監聽 (解決切換頁面可能冇 Refresh 嘅問題)
  if(document.getElementById('readingApp').style.display === 'flex') {
    if(currentReadPage === 'wishlist') window.renderWishlist();
  }
};

// ========== 📱 書本長按 / 右鍵選單 ==========
let bookPressTimer = null;
let isBookLongPress = false;

window.handleBookPressStart = (e, bookId) => {
  isBookLongPress = false;
  if (bookPressTimer) clearTimeout(bookPressTimer);
  bookPressTimer = setTimeout(() => {
    isBookLongPress = true;
    if (navigator.vibrate) navigator.vibrate(50); // 觸發手機微震動回饋
    window.showBookMenu(e, bookId);
  }, 500); // 500ms 當作長按
};

window.handleBookPressEnd = () => {
  if (bookPressTimer) {
    clearTimeout(bookPressTimer);
    bookPressTimer = null;
  }
};

window.handleBookClick = (e, bookId) => {
  // 如果判斷為長按，就攔截一般點擊，避免又開選單又入詳情頁
  if (isBookLongPress) {
    e.preventDefault();
    e.stopPropagation();
    return;
  }
  viewBook(bookId);
};

window.showBookMenu = (e, bookId) => {
  e.preventDefault();
  e.stopPropagation();
  const book = window.allBooks.find(b => b.id === bookId);
  if(!book) return;

  let html = `<div class="modal-box" onclick="event.stopPropagation()">
    <h3 class="font-bold text-lg text-primary mb-4 text-center truncate px-2">《${book.title}》</h3>
    <div class="space-y-2">`;
  
  // 智能選項 1：標記為已讀完 (如果目前唔係 finished)
  if (book.status !== 'finished') {
    // 💡 巧妙地重用咗你之前寫落嘅 quickFinishBook，佢會自動彈出問你結束日期
    html += `<button onclick="closeModal(); quickFinishBook('${book.id}', '${book.title.replace(/'/g,"\\'")}')" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-sm">
      <i data-lucide="check-circle" class="w-5 h-5"></i> 標記為已讀完
    </button>`;
  }
  
  // 智能選項 2：移至閱讀中 或 開始閱讀 (根據目前狀態區分)
  if (book.status === 'finished') {
    html += `<button onclick="closeModal(); promptRevertToReading('${book.id}', '${book.title.replace(/'/g,"\\'")}')" class="w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-sm">
      <i data-lucide="rotate-ccw" class="w-5 h-5"></i> 移至閱讀中
    </button>`;
  } else if (book.status === 'wishlist') {
    html += `<button onclick="closeModal(); promptStartReading('${book.id}', '${book.title.replace(/'/g,"\\'")}')" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-sm">
      <i data-lucide="play-circle" class="w-5 h-5"></i> 開始閱讀
    </button>`;
  }

  // 智能選項 3：移回有興趣 (如果目前唔係 wishlist)
  if (book.status !== 'wishlist') {
    html += `<button onclick="window.menuMoveToWishlist('${book.id}')" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-sm">
      <i data-lucide="heart" class="w-5 h-5"></i> 移回有興趣
    </button>`;
  }

  // 刪除與取消
  html += `
      <button onclick="closeModal(); deleteBook('${book.id}')" class="w-full bg-red-50 hover:bg-red-100 text-red-500 font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
        <i data-lucide="trash-2" class="w-5 h-5"></i> 刪除此書
      </button>
      <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-2.5 rounded-xl hover:bg-slate-200 transition mt-2">取消</button>
    </div>
  </div>`;
  
  showModal(html);
  lucide.createIcons();
};

window.menuMoveToWishlist = async (bookId) => {
  try {
    await db.collection("users").doc(currentUser.uid).collection("books").doc(bookId).update({
      status: 'wishlist',
      endDate: '' // 清除可能殘留嘅結束日期
    });
    closeModal();
    showToast('已移回有興趣清單 🧐', 'info');
  } catch(e) {
    showToast('更新失敗，請檢查網絡', 'error');
  }
};
</script>
</body>
</html>
